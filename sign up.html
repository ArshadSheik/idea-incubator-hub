<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Incubator - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a href="index.html" class="navbar-brand fw-bold">Idea Incubator</a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="page-narrow mx-auto">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Create your account</h1>
          <p class="text-muted small mb-4">Join the platform to submit and collaborate on startup ideas.</p>

          <div id="registerAlert" class="alert d-none" role="alert"></div>

          <form id="registerForm" novalidate>
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input id="name" name="name" type="text" class="form-control" required minlength="2" placeholder="Your full name">
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input id="email" name="email" type="email" class="form-control" required placeholder="you@example.com">
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input id="password" name="password" type="password" class="form-control" required minlength="6" placeholder="At least 6 characters">
            </div>
            <div class="mb-4">
              <label for="confirmPassword" class="form-label">Confirm password</label>
              <input id="confirmPassword" name="confirmPassword" type="password" class="form-control" required minlength="6" placeholder="Enter password again">
            </div>

            <button type="submit" class="btn btn-primary w-100">Register</button>
          </form>

          <p class="text-center small mt-3 mb-0">
            Already have an account?
            <a href="index.html">Back to home</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
