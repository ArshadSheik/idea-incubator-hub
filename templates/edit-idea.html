<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Incubator - Edit Idea</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <span class="navbar-brand fw-bold">Idea Incubator</span>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><span class="nav-link">Explore Ideas</span></li>
          <li class="nav-item"><span class="nav-link">Submit Idea</span></li>
          <li class="nav-item"><span class="nav-link">Collaboration</span></li>
          <li class="nav-item"><span class="nav-link">My Profile</span></li>
        </ul>
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-outline-light btn-sm">Login</button>
          <button type="button" class="btn btn-warning btn-sm">Sign Up</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="mx-auto" style="max-width: 760px;">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-2">Edit Idea</h1>
          <p class="text-muted small mb-4">Update your startup idea details before sharing with others.</p>

          <div id="editIdeaAlert" class="alert d-none" role="alert"></div>

          <form id="editIdeaForm" novalidate>
            <div class="mb-3">
              <label for="ideaTitle" class="form-label">Idea title</label>
              <input id="ideaTitle" name="ideaTitle" type="text" class="form-control" placeholder="e.g. AI Learning Companion" required minlength="5">
            </div>

            <div class="mb-3">
              <label for="ideaTag" class="form-label">Category</label>
              <select id="ideaTag" name="ideaTag" class="form-select" required>
                <option value="">Select a category</option>
                <option>Education</option>
                <option>Health</option>
                <option>Fintech</option>
                <option>SaaS</option>
                <option>Productivity</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="ideaStage" class="form-label">Current stage</label>
              <select id="ideaStage" name="ideaStage" class="form-select" required>
                <option value="">Select a stage</option>
                <option>Concept</option>
                <option>Prototype</option>
                <option>MVP</option>
                <option>Early users</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="ideaSummary" class="form-label">One-line summary</label>
              <input id="ideaSummary" name="ideaSummary" type="text" class="form-control" placeholder="Describe the value in one sentence" required minlength="10">
            </div>

            <div class="mb-4">
              <label for="ideaDescription" class="form-label">Detailed description</label>
              <textarea id="ideaDescription" name="ideaDescription" rows="6" class="form-control" placeholder="Problem, solution, target users, and uniqueness..." required minlength="30"></textarea>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">Save Changes</button>
              <a href="home.html" class="btn btn-outline-secondary">Back to Home</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
