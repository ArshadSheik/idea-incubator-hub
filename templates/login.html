<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Log in — Idea Incubator Hub</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    </head>
    <body data-page="login" class="auth-body">

        <div class="auth-split">
            <div class="auth-form-side">
                <div class="auth-form-inner">
                    <a href="index.html" class="auth-brand">
                    <span class="brand-mark"><i class="bi bi-lightbulb-fill"></i></span>
                    <span>Idea Incubator</span>
                    </a>

                    <div class="auth-header">
                    <h1>Welcome back. 👋</h1>
                    <p>Log in to keep building, voting, and collaborating.</p>
                    </div>

                    <div id="loginAlert" class="alert-iih alert-danger-iih" style="display:none;"></div>

                    <form id="loginForm" class="auth-form" novalidate>
                    <div class="mb-3">
                        <label class="form-label-iih" for="email">Email address</label>
                        <div class="input-with-icon">
                        <i class="bi bi-envelope"></i>
                        <input type="email" id="email" class="form-control-iih" placeholder="you@example.com" required>
                        </div>
                        <div class="form-error" data-error-for="email">Please enter a valid email.</div>
                    </div>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label-iih mb-0" for="password">Password</label>
                        <a href="#" class="small fw-semibold text-brand">Forgot?</a>
                        </div>
                        <div class="input-with-icon mt-1">
                        <i class="bi bi-lock"></i>
                        <input type="password" id="password" class="form-control-iih" placeholder="••••••••" required>
                        <button type="button" class="input-toggle" data-toggle-password="password">
                            <i class="bi bi-eye"></i>
                        </button>
                        </div>
                        <div class="form-error" data-error-for="password">Password is required.</div>
                    </div>

                    <div class="form-check mb-4">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Keep me logged in</label>
                    </div>

                    <button type="submit" class="btn btn-brand btn-lg-iih w-100">
                        Log in <i class="bi bi-arrow-right"></i>
                    </button>

                    <div class="auth-divider">
                        <span>or continue with</span>
                    </div>

                    <div class="row g-2">
                        <div >
                            <button type="button" class="btn btn-outline-iih w-100 social-btn">
                                <i class="bi bi-google"></i>
                            </button>
                        </div>
                    </div>

                    <div class="auth-footer-text">
                        Don't have an account? <a href="register.html" class="fw-semibold">Sign up — it's free</a>
                    </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="{{ url_for('static', filename='js/main.js') }}"></script>
        <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    </body>
</html>
